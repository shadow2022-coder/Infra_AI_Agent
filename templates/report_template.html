<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraRed AI Report</title>
  <style>
    :root {
      --bg: #09121d;
      --panel: rgba(15, 30, 48, 0.88);
      --panel-alt: #19314c;
      --ink: #eef6ff;
      --muted: #a2b8cf;
      --line: rgba(255,255,255,0.09);
      --good: #62cf88;
      --warn: #ffcf5a;
      --bad: #ff6b7a;
      --accent: #ff8b5e;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,139,94,0.22), transparent 24%),
        linear-gradient(160deg, #08111b, #112235 55%, #0d1928);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 16px 72px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 18px 52px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }
    .hero { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .card, .metric {
      background: var(--panel-alt);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .muted { color: var(--muted); }
    .decision {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
    }
    .decision.PASS { background: rgba(98,207,136,0.18); color: var(--good); }
    .decision.GO_WITH_CAUTION { background: rgba(243,156,74,0.18); color: var(--accent); }
    .decision.REVIEW { background: rgba(255,207,90,0.16); color: var(--warn); }
    .decision.BLOCK { background: rgba(255,107,122,0.18); color: var(--bad); }
    .meter {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      margin: 10px 0 12px;
    }
    .meter-fill { height: 100%; border-radius: 999px; }
    h1,h2,h3,p { margin-top: 0; }
    .timeline, .chain { display: grid; gap: 10px; }
    .chain { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
    .chain-step {
      background: rgba(255,139,94,0.12);
      border: 1px solid rgba(255,139,94,0.3);
      border-radius: 16px;
      padding: 14px;
    }
    details {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 10px;
    }
    summary { cursor: pointer; font-weight: 600; }
    .pill {
      display: inline-flex;
      padding: 5px 10px;
      margin: 4px 6px 0 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 0.9rem;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    button.filter, button.copy, .lightbox-close, #topBtn {
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
    }
    button.filter.active { background: rgba(255,139,94,0.22); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    .score-wrap { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .score-gauge {
      width: 156px;
      height: 156px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .score-gauge-center {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #09121d;
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-big { font-size: 2rem; font-weight: 800; line-height: 1; }
    .score-small { font-size: 0.8rem; color: var(--muted); }
    .thumb-button {
      width: 100%;
      padding: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: left;
    }
    .thumb-image {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
      display: block;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 16, 0.84);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative;
      width: min(95vw, 1200px);
      max-height: 90vh;
      overflow: auto;
      background: rgba(9, 18, 29, 0.98);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    .lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      width: auto;
      height: auto;
      display: block;
      margin: 0 auto 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
    }
    .lightbox-close {
      position: absolute;
      top: 12px;
      right: 12px;
    }
    #topBtn { position: fixed; right: 16px; bottom: 16px; display: none; }
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <button id="topBtn">Back to top</button>
  <script>
    const payload = __REPORT_DATA__;
    const report = payload.report;
    const rules = payload.rules || [];
    const esc = (value) => String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const summary = report.executive_summary || {};
    const topRisks = report.top_risks || [];
    const safeAreas = report.safe_areas || [];
    const agentCards = report.agent_cards || [];
    const dynamicTesting = report.dynamic_testing || {};
    const runtimeAgents = dynamicTesting.runtime_agents || [];
    const runtimeEvidence = dynamicTesting.evidence_cards || [];
    const runtimeScreenshots = dynamicTesting.screenshots || [];
    const dynamicFindings = dynamicTesting.findings || [];
    const dynamicChecks = dynamicTesting.checks || [];
    const proofMetadata = dynamicTesting.proof_metadata || {};
    const timeline = dynamicTesting.timeline || [];
    const dynamicReason = String(dynamicTesting.reason || "");
    const completedDynamic = ["completed", "completed_after_repair"].includes(dynamicTesting.status);
    const safeTestAgentsMode = dynamicTesting.mode === "SafeTestAgents";
    const dockerUnavailable = dynamicTesting.status === "skipped" && dynamicReason === "docker_unavailable";
    const dynamicStatusLabel = !dynamicTesting.enabled
      ? "Not enabled"
      : dockerUnavailable
      ? "Skipped - Docker unavailable"
      : dynamicTesting.status === "unsupported" || dynamicReason === "unsupported_startup"
      ? "Skipped - Unsupported startup"
      : dynamicTesting.status === "completed"
      ? "Completed"
      : String(dynamicTesting.status || "not_enabled").replace(/_/g, " ");
    const dynamicReasonLabel = dynamicReason === "docker_unavailable"
      ? "Docker Desktop is not running or Docker socket is unavailable."
      : dynamicReason === "sandbox_disabled_in_demo_fallback"
      ? "Sandbox testing is disabled in Demo Fallback mode."
      : dynamicReason === "unsupported_startup"
      ? "No safe startup strategy was detected."
      : dynamicReason === "app_not_reachable"
      ? "The sandbox app did not become safely reachable on localhost in time."
      : ["playwright_not_installed", "screenshot_capture_failed"].includes(dynamicReason)
      ? "Browser evidence capture failed."
      : dynamicReason
      ? dynamicReason.replace(/_/g, " ")
      : "";
    const sandboxFixGuidance = dockerUnavailable
      ? "Docker Desktop was not running or not reachable. Open Docker Desktop, wait until it says running, confirm docker info works, then rerun SafeTestAgents."
      : dynamicReason === "unsupported_startup"
      ? "No safe startup strategy was detected. Ask your coding agent to add a Dockerfile, package.json or requirements.txt, README.md with exact run command, and a /health route."
      : dynamicReason === "app_not_reachable"
      ? "The container started but the app did not become reachable. Check that the app binds to 0.0.0.0, prints or documents its port, and exposes /health or /api/health."
      : ["playwright_not_installed", "screenshot_capture_failed"].includes(dynamicReason)
      ? "Browser evidence capture failed. Run python -m playwright install chromium, confirm the app renders cleanly in the sandbox, then rerun SafeTestAgents."
      : "Review the sanitized sandbox error, fix the issue, then rerun SafeTestAgents.";
    const attackChain = report.attack_chain || {};
    const attackCoverage = report.attack_coverage_matrix || [];
    const ruleSummary = report.rule_summary || {};
    const applicableRules = rules.filter(rule => rule.status === "fail" || rule.status === "review");
    const passedRules = rules.filter(rule => rule.status === "pass");
    const notUsedRules = rules.filter(rule => rule.status === "not_applicable");
    const decisionLabel = esc(String(report.decision || "").replace(/_/g, " "));
    const score = Math.max(0, Math.min(100, Number(report.confidence_score || report.risk_score || 0)));
    const scoreBand = esc(report.confidence_status || report.score_band || "");
    const meterColor = score <= 39 ? "#ff6b7a" : score <= 69 ? "#ffcf5a" : score <= 84 ? "#f39c4a" : "#62cf88";
    const riskLevel = esc(report.risk_level || "Medium Risk");
    const scanConfidence = esc(report.scan_confidence || "Medium");
    const reviewRequired = Number(report.incomplete_agent_count || 0);
    const reliableAgents = Math.max(0, Number(report.agents_completed_count || 0) - reviewRequired);
    const showSandboxSection = Boolean(
      dynamicTesting.attempted ||
      dynamicTesting.enabled ||
      ["completed", "completed_after_repair", "failed", "incomplete", "unsupported", "skipped", "repair_attempted"].includes(dynamicTesting.status)
    );
    const riskBadge = riskLevel === "Low Risk"
      ? `<span class="pill" style="background:rgba(98,207,136,0.16);color:#62cf88;">${riskLevel}</span>`
      : riskLevel === "Medium Risk"
      ? `<span class="pill" style="background:rgba(255,207,90,0.16);color:#ffcf5a;">${riskLevel}</span>`
      : riskLevel === "High Risk"
      ? `<span class="pill" style="background:rgba(255,139,94,0.18);color:#ff8b5e;">${riskLevel}</span>`
      : `<span class="pill" style="background:rgba(255,107,122,0.18);color:#ff6b7a;">${riskLevel}</span>`;

    const renderDetails = (title, body) => `<details><summary>${esc(title)}</summary>${body}</details>`;
    const renderRuleRows = (items) => items.map(rule => `<tr><td>${esc(rule.title)}</td><td>${esc(rule.severity)}</td><td>${esc(rule.status)}</td><td>${esc(rule.file)}</td><td>${esc(rule.evidence)}</td><td>${esc(rule.fix)}</td></tr>`).join("");
    const renderScoreGauge = () => `
      <div class="score-wrap">
        <div class="score-gauge" style="background:conic-gradient(${meterColor} 0 ${score}%, rgba(255,255,255,0.08) ${score}% 100%);">
          <div class="score-gauge-center">
            <div class="score-big">${score}</div>
            <div class="score-small">/ 100</div>
          </div>
        </div>
        <div>
          <div class="muted">Confidence Score</div>
          <h2>${score} / 100</h2>
          <p class="muted">Status: ${scoreBand}</p>
          <p class="muted">High score is good. Risk is shown separately.</p>
        </div>
      </div>
    `;

    document.getElementById("app").innerHTML = `
      <section class="panel hero">
        <div>
          <p class="muted">InfraRed AI investor-demo report</p>
          <h1>${esc(report.product)}</h1>
          <p class="muted">Uploaded Project Name: ${esc(report.project_name || "infrared_scan")}</p>
          <p>${esc(summary.plain_english || "")}</p>
          ${renderScoreGauge()}
        </div>
        <div class="grid">
          <div class="metric"><div class="muted">Decision</div><div class="decision ${esc(report.decision)}">${decisionLabel}</div></div>
          <div class="metric"><div class="muted">Risk Level</div><div>${riskBadge}</div></div>
          <div class="metric"><div class="muted">Scan Confidence</div><strong>${scanConfidence}</strong><div class="muted">${reviewRequired ? "Reduced by incomplete AI review." : "Based on completed static, AI, and runtime evidence."}</div></div>
          <div class="metric"><div class="muted">Confidence Score</div><strong>${score}/100</strong><div class="muted">${scoreBand}</div></div>
          <div class="metric"><div class="muted">Project</div><strong>${esc(report.project_name || "infrared_scan")}</strong></div>
          <div class="metric"><div class="muted">Detected stack</div><strong>${esc(report.detected_stack)}</strong></div>
          <div class="metric"><div class="muted">Rule Summary</div><strong>${applicableRules.length} applicable issues / ${esc(report.passed_tests_count)} passed / ${esc(report.rules_not_used_count || ruleSummary.not_applicable || 0)} not used</strong></div>
          <div class="metric"><div class="muted">AI Security Board</div><strong>${reviewRequired ? `${reliableAgents}/${esc(report.agents_expected_count || 5)} complete` : `${reliableAgents}/${esc(report.agents_expected_count || 5)} complete`}</strong><div class="muted">${reviewRequired ? `${reviewRequired} agent requires review` : "All specialist agents completed."}</div></div>
        </div>
      </section>

      <section class="panel">
        <h2>Why This Decision</h2>
        <p>${esc(summary.why_this_decision || "")}</p>
        <p><strong>Recommended next step:</strong> ${esc(summary.recommended_next_step || "")}</p>
        ${renderDetails("Attack chain", `
          <p>${esc(attackChain.plain_english_summary || "No complete attack chain found from the available evidence.")}</p>
          <div class="chain">
            ${(attackChain.steps || []).map(step => `<div class="chain-step"><strong>${esc(step.label)}</strong><p>${esc(step.description)}</p><div class="muted">${esc(step.related_finding || "")}</div></div>`).join("")}
          </div>
        `)}
        ${renderDetails("What to fix first", `
          <div class="timeline">
            ${(report.what_to_fix_first || []).map(item => `
              <div class="card">
                <strong>${esc(item.priority)}. ${esc(item.fix)}</strong>
                <p>${esc(item.why_first || "")}</p>
                <p class="muted">Effort: ${esc(item.estimated_effort || "")}</p>
                ${(item.files || []).map(file => `<span class="pill">${esc(file)}</span>`).join("")}
              </div>
            `).join("")}
          </div>
        `)}
        <h3>Attack Coverage Matrix</h3>
        <table>
          <thead><tr><th>Attack category</th><th>Status</th><th>Reason</th></tr></thead>
          <tbody>
            ${attackCoverage.map(item => `<tr><td>${esc(item.category)}</td><td>${esc(item.status)}</td><td>${esc(item.reason)}</td></tr>`).join("")}
          </tbody>
        </table>
        ${renderDetails("Audit process", `
          <div class="timeline">
            ${(report.audit_process || []).map(item => `<div class="card"><strong>${esc(item.step)}</strong><div class="muted">${esc(item.what_happened)}</div></div>`).join("")}
          </div>
        `)}
      </section>

      <section class="panel">
        <h2>Top Risks</h2>
        <div class="grid">
          ${topRisks.map((risk) => `
            <div class="card">
              <div class="muted">${esc((risk.severity || "").toUpperCase())}</div>
              <h3>${esc(risk.title)}</h3>
              <p>${esc(risk.simple_explanation)}</p>
              <p><strong>Fix:</strong> ${esc(risk.fix_summary)}</p>
              <button class="copy" data-copy="${esc(risk.fix_summary)}">Copy fix</button>
              ${renderDetails("View technical details", `
                <p><strong>Files:</strong> ${(risk.affected_files || []).map(file => `<span class="pill">${esc(file)}</span>`).join("") || "N/A"}</p>
                <p><strong>Business impact:</strong> ${esc(risk.business_impact)}</p>
                <p><strong>Technical details:</strong> ${esc((risk.deep_dive || {}).technical_details || "")}</p>
                <p><strong>Evidence:</strong> ${esc((risk.deep_dive || {}).evidence || "")}</p>
                <p><strong>Exact fix:</strong> ${esc((risk.deep_dive || {}).exact_fix || "")}</p>
              `)}
            </div>
          `).join("")}
        </div>
      </section>

      <section class="panel">
        <h2>Safe Areas</h2>
        <div class="grid">
          ${safeAreas.map(item => `
            <div class="card">
              <strong>${esc(item.title || "Safe area")}</strong>
              <p>${esc(item.simple_explanation || "")}</p>
              <p class="muted">${esc(item.assumption || "")}</p>
            </div>
          `).join("")}
        </div>
      </section>

      <section class="panel">
        <h2>AI Security Board</h2>
        <div class="grid">
          ${agentCards.map(card => `
            <div class="card">
              <div class="muted">${esc(card.agent)}</div>
              <strong>${esc(card.status)}</strong>
              <p>${esc(card.one_line_summary)}</p>
              <p class="muted">${esc(card.output_valid === false ? "Fallback-normalized review output" : "Valid normalized output")}</p>
              ${(card.top_risks || []).slice(0, 2).map(item => `<div class="pill">${esc(item)}</div>`).join("") || "<p class='muted'>No highlighted contextual risk.</p>"}
              <p><strong>Top fix:</strong> ${esc(card.top_fix || "")}</p>
              ${renderDetails("In-depth analysis", `
                <p><strong>Evidence used:</strong> ${esc((card.in_depth || {}).evidence_used || "")}</p>
                <p><strong>Business impact:</strong> ${esc((card.in_depth || {}).business_impact || "")}</p>
                <p><strong>Assumptions:</strong> ${esc(((card.in_depth || {}).assumptions || []).join(" | "))}</p>
              `)}
            </div>
          `).join("")}
        </div>
      </section>

      ${showSandboxSection ? `
      <section class="panel">
        <h2>${completedDynamic ? "Sandbox Proof / Runtime Evidence" : "Dynamic Sandbox Testing"}</h2>
        <p class="muted">Run the uploaded app in a local disposable Docker sandbox and check browser/runtime behavior before deployment.</p>
        <p class="muted">Experimental · Opt-in · Local sandbox only</p>
        <p>${esc(dynamicTesting.summary || "Dynamic sandbox testing was not enabled.")}</p>
        <div class="grid">
          <div class="metric"><div class="muted">Enabled</div><strong>${esc(dynamicTesting.enabled ? "Yes" : "No")}</strong></div>
          <div class="metric"><div class="muted">Status</div><strong>${esc(dynamicStatusLabel)}</strong></div>
          <div class="metric"><div class="muted">Runtime Findings</div><strong>${esc(dynamicFindings.length)}</strong></div>
          <div class="metric"><div class="muted">Cleanup</div><strong>${esc(dynamicTesting.cleanup_status || "pending")}</strong></div>
        </div>
        ${dynamicReasonLabel ? `<p class="muted"><strong>Reason:</strong> ${esc(dynamicReasonLabel)}</p>` : ""}
        ${completedDynamic ? `<p class="muted">Real sandbox evidence captured inside a disposable local Docker container.</p>` : ""}
        ${completedDynamic && proofMetadata && Object.keys(proofMetadata).length ? `<h3>Proof metadata</h3><div class="grid">
          <div class="metric"><div class="muted">Tested URL</div><strong>${esc(proofMetadata.tested_url || "N/A")}</strong></div>
          <div class="metric"><div class="muted">Timestamp</div><strong>${esc(proofMetadata.timestamp || "N/A")}</strong></div>
          <div class="metric"><div class="muted">Docker image</div><strong>${esc(proofMetadata.docker_image_name || "N/A")}</strong></div>
          <div class="metric"><div class="muted">Container ID</div><strong>${esc(proofMetadata.container_id_short || "N/A")}</strong></div>
          <div class="metric"><div class="muted">Routes tested</div><strong>${esc((proofMetadata.routes_tested || []).join(", ") || "N/A")}</strong></div>
          <div class="metric"><div class="muted">Screenshot count</div><strong>${esc(proofMetadata.screenshot_count || 0)}</strong></div>
          <div class="metric"><div class="muted">Readiness</div><strong>${esc(proofMetadata.readiness_note || "N/A")}</strong></div>
        </div>` : ""}
        ${runtimeAgents.length ? `<h3>Runtime Agents</h3><div class="grid">
          ${runtimeAgents.map(card => `
            <div class="card">
              <div class="muted">${esc(card.agent)}</div>
              <strong>${esc(card.status)}</strong>
              <p>${esc(card.one_line_summary)}</p>
              ${(card.top_risks || []).slice(0, 2).map(item => `<div class="pill">${esc(item)}</div>`).join("") || "<p class='muted'>No highlighted runtime issue.</p>"}
              <p><strong>Top fix:</strong> ${esc(card.top_fix || "")}</p>
            </div>
          `).join("")}
        </div>` : ""}
        ${completedDynamic && runtimeScreenshots.length ? `<h3>Real Playwright browser screenshots</h3><div class="grid">
          ${runtimeScreenshots.map((card, index) => `
            <div class="card">
              ${card.image_data_url ? `<button class="thumb-button screenshot-trigger" data-screenshot-index="${index}">
                <img class="thumb-image" src="${esc(card.image_data_url)}" alt="${esc(card.title || "Real Playwright screenshot")}" />
              </button>` : ""}
              <strong>${esc(card.title || "Real Playwright screenshot")}</strong>
              <p>${esc(card.summary || "")}</p>
              <p class="muted">Route tested: ${esc(card.route || "/")}</p>
              <p class="muted">Status code: ${esc(card.status_code || 0)} · Timestamp: ${esc(card.captured_at || "")}</p>
              <button class="filter screenshot-trigger" data-screenshot-index="${index}">View full screenshot</button>
              <p class="muted">${esc(card.file_name || "")}</p>
            </div>
          `).join("")}
        </div>` : ""}
        ${completedDynamic && !runtimeScreenshots.length ? `<p class="muted">No browser screenshots captured.</p>` : ""}
        ${completedDynamic && runtimeEvidence.length && !runtimeScreenshots.length ? `<h3>Runtime Evidence Cards</h3><div class="grid">
          ${runtimeEvidence.map(card => `
            <div class="card">
              ${card.image_data_url ? `<img class="thumb-image" src="${esc(card.image_data_url)}" alt="${esc(card.title || "Sanitized evidence card")}" />` : ""}
              <strong>${esc(card.title || "Sanitized evidence card")}</strong>
              <p>${esc(card.summary || "")}</p>
            </div>
          `).join("")}
        </div>` : ""}
        ${completedDynamic && dynamicChecks.length ? renderDetails("Runtime checks table", `
          <table>
            <thead><tr><th>Check</th><th>Path</th><th>Status</th><th>Severity</th><th>Evidence</th></tr></thead>
            <tbody>${dynamicChecks.map(item => `<tr><td>${esc(item.title)}</td><td>${esc(item.path)}</td><td>${esc(item.status)}</td><td>${esc(item.severity)}</td><td>${esc(item.evidence)}</td></tr>`).join("")}</tbody>
          </table>
        `) : ""}
        ${completedDynamic && dynamicFindings.length ? renderDetails("Dynamic runtime findings", `
          <table>
            <thead><tr><th>Finding</th><th>Severity</th><th>Path</th><th>Evidence</th><th>Fix</th></tr></thead>
            <tbody>${dynamicFindings.map(item => `<tr><td>${esc(item.title)}</td><td>${esc(item.severity)}</td><td>${esc(item.path)}</td><td>${esc(item.evidence)}</td><td>${esc(item.fix)}</td></tr>`).join("")}</tbody>
          </table>
        `) : ""}
      </section>` : ""}

      ${dynamicTesting.repair_changes && dynamicTesting.repair_changes.length ? `
      <section class="panel">
        <h2>Changes Made to Enable Sandbox Testing</h2>
        <p class="muted">These changes were applied only to a temporary sandbox copy. The original uploaded project ZIP was not modified.</p>
        <p class="muted">Original sandbox failure: ${esc((dynamicTesting.original_failure || {}).message || dynamicTesting.reason || "Unknown failure")}</p>
        <p class="muted">Repair result: ${esc(dynamicTesting.repair_status || "attempted")} · Screenshots captured after repair: ${runtimeScreenshots.length ? "yes" : "no"}</p>
        <table>
          <thead><tr><th>File</th><th>Change Type</th><th>Reason</th><th>Summary</th><th>Security Impact</th></tr></thead>
          <tbody>${dynamicTesting.repair_changes.map(item => `<tr><td>${esc(item.file)}</td><td>${esc(item.change_type)}</td><td>${esc(item.reason)}</td><td>${esc(item.summary)}</td><td>${esc(item.security_impact)}</td></tr>`).join("")}</tbody>
        </table>
      </section>` : ""}

      ${safeTestAgentsMode && !completedDynamic ? `
      <section class="panel">
        <h2>How to Get Sandbox Testing Done</h2>
        <p>${esc(sandboxFixGuidance)}</p>
      </section>` : ""}

      <section class="panel">
        <h2>Rule Test Results</h2>
        <p class="muted">Not Used means the rule was not applicable because the required stack, file, or feature was not present.</p>
        <h3>Applicable Issues</h3>
        <table>
          <thead><tr><th>Rule</th><th>Severity</th><th>Status</th><th>File</th><th>Evidence</th><th>Fix</th></tr></thead>
          <tbody id="ruleRows">
            ${renderRuleRows(applicableRules) || "<tr><td colspan='6'>No applicable issues found.</td></tr>"}
          </tbody>
        </table>
        ${renderDetails("Passed Rules", `
          <table>
            <thead><tr><th>Rule</th><th>Severity</th><th>Status</th><th>File</th><th>Evidence</th><th>Fix</th></tr></thead>
            <tbody>${renderRuleRows(passedRules) || "<tr><td colspan='6'>No passed rules recorded.</td></tr>"}</tbody>
          </table>
        `)}
        ${renderDetails("Not Used / Not Applicable Rules", `
          <table>
            <thead><tr><th>Rule</th><th>Severity</th><th>Status</th><th>File</th><th>Reason</th><th>Fix</th></tr></thead>
            <tbody>${notUsedRules.map(rule => `<tr><td>${esc(rule.title)}</td><td>${esc(rule.severity)}</td><td>${esc(rule.status)}</td><td>${esc(rule.file)}</td><td>${esc(rule.why_it_matters || rule.reason || "")}</td><td>${esc(rule.fix)}</td></tr>`).join("") || "<tr><td colspan='6'>No not-used rules recorded.</td></tr>"}</tbody>
          </table>
        `)}
        ${renderDetails("All Rule Results", `
          <table>
            <thead><tr><th>Rule</th><th>Severity</th><th>Status</th><th>File</th><th>Evidence</th><th>Fix</th></tr></thead>
            <tbody>${renderRuleRows(rules)}</tbody>
          </table>
        `)}
      </section>

      <div class="lightbox" id="lightbox">
        <div class="lightbox-inner">
          <button class="lightbox-close" id="lightboxClose">Close</button>
          <img id="lightboxImage" alt="Runtime screenshot" />
          <div id="lightboxCaption" class="muted"></div>
        </div>
      </div>
    `;

    document.querySelectorAll(".copy").forEach(button => {
      button.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(button.dataset.copy || "");
          button.textContent = "Copied";
          setTimeout(() => button.textContent = "Copy fix", 1200);
        } catch (_) {}
      });
    });
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const closeLightbox = () => lightbox.classList.remove("open");
    document.querySelectorAll(".screenshot-trigger").forEach(button => {
      button.addEventListener("click", () => {
        const item = runtimeScreenshots[Number(button.dataset.screenshotIndex || 0)] || {};
        if (!item.image_data_url) return;
        lightboxImage.src = item.image_data_url;
        lightboxCaption.textContent = `Route: ${item.route || "/"} | Status: ${item.status_code || 0} | Timestamp: ${item.captured_at || ""} | Notes: ${item.summary || ""}`;
        lightbox.classList.add("open");
      });
    });
    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeLightbox();
    });
    const topBtn = document.getElementById("topBtn");
    window.addEventListener("scroll", () => {
      topBtn.style.display = window.scrollY > 400 ? "block" : "none";
    });
    topBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  </script>
</body>
</html>
